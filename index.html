  <style>
    :root {
      --bg-color: #050505;
      --surface-color: #131416;
      --border-color: #292b2d;
      --text-primary: #f3f3f1;
      --text-secondary: #adadad;
      --text-dark: #0d0d0d;
      --accent-color: #0037ff;
      --accent-hover: #0037ff;
      /* Feedback Colors */
      --correct: #538d4e;
      --partial: #b59f3b;
      --higher: #2196F3;
      --lower: #a72cdc;
      --wrong: #eb4b48;
      /* Typography */
      --font-main: 'Rethink Sans', 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Fragment Mono', 'JetBrains Mono', 'Fira Code', monospace;
      /* Layout */
      --max-guesses: 6;
      --cell-size: 48px;
      --grid-gap: 8px;
      --border-radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* STARFIELD CANVAS */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between; /* Changed to space-between for mobile responsiveness */
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      background: #05050520;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      /* Removed width: 100% and justify-content: center to allow flexbox to work */
    }

    .header-controls {
      display: flex;
      gap: 8px;
    }

    #help-btn, #reset-btn {
      /* Removed absolute positioning */
      position: static;
      transform: none;
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      transition: 0.2s;
    }

    .btn-icon:hover {
      background: var(--surface-color);
      border-color: var(--accent-color);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      white-space: nowrap; /* Prevent logo text wrapping */
    }

    /* MAIN GAME AREA */
    main {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 100px;
      align-items: center; /* Center the game board */
    }

    #game-board {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      width: 100%;
      max-width: 600px; /* Max width for desktop */
    }

    /* GUESS GRID */
    #guess-grid {
      display: flex;
      flex-direction: column;
      gap: var(--grid-gap);
      width: 100%;
    }

    .guess-row,
    .header-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr); /* Changed from minmax to 1fr for fluid scaling */
      gap: var(--grid-gap);
      width: 100%;
    }

    .header-row {
      margin-bottom: 12px;
    }

    .header-cell {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--cell-size); /* Align with cell height */
    }

    .cell {
      background: var(--surface-color);
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius);
      height: var(--cell-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      padding: 4px;
      word-break: break-word;
      transition: all 0.2s ease;
      min-width: 0; /* Allow shrinking */
      overflow: hidden; /* Hide overflow if text is too long */
    }

    .cell.correct { background: var(--correct); border-color: var(--correct); color: var(--text-dark); }
    .cell.partial { background: var(--partial); border-color: var(--partial); color: var(--text-dark); }
    .cell.higher   { background: var(--higher); border-color: var(--higher); color: var(--text-dark); }
    .cell.lower    { background: var(--lower); border-color: var(--lower); color: var(--text-dark); }
    .cell.wrong    { background: var(--wrong); border-color: var(--wrong); color: var(--text-dark); }
    .cell.empty    { background: transparent; border: 2px solid var(--border-color); color: transparent; }
    .cell.neutral  { background: var(--surface-color); border-color: var(--border-color); color: var(--text-primary); }

    /* GUESS ANIMATION */
    @keyframes cellFadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .cell.animate {
      animation: cellFadeIn 0.35s ease-out forwards;
      opacity: 0;
    }

    /* INPUT AREA */
    .search-container {
      position: relative;
      flex: 1; /* Take up available space */
      min-width: 0; /* Prevent flex item from overflowing */
    }

    #project-input {
      width: 100%;
      padding: 12px;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 1rem;
      outline: none;
    }
    #project-input:focus { border-color: var(--accent-color); }

    #autocomplete-list {
      position: absolute; bottom: 100%; left: 0; right: 0;
      background: var(--surface-color); border: 2px solid var(--border-color);
      border-radius: var(--border-radius); max-height: 150px; overflow-y: auto;
      display: none; z-index: 30;
    }
    .ac-item {
      padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: var(--bg-color); }
    .ac-short { font-weight: 700; color: var(--accent-color); }
    .ac-long  { color: var(--text-secondary); margin-left: 6px; }

    #submit-btn {
      padding: 0 20px; /* Horizontal padding */
      background: var(--accent-color);
      color: var(--text-primary);
      border: none;
      border-radius: var(--border-radius);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      height: 48px; /* Match input height roughly */
      white-space: nowrap;
      flex: 0 0 auto; /* Don't shrink */
    }
    #submit-btn:hover { background: var(--accent-hover); }
    #submit-btn:disabled { background: var(--border-color); cursor: not-allowed; opacity: 0.5; }

    #input-area {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
    }

    #autocomplete-list::-webkit-scrollbar { width: 8px; }
    #autocomplete-list::-webkit-scrollbar-track { background: transparent; }
    #autocomplete-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    #autocomplete-list::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* MODALS */
    .modal-content {
      background: var(--surface-color); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 20px; max-width: 400px; width: 100%;
      text-align: center;
    }
    .modal-content h2 { margin-bottom: 12px; }
    .modal-content p { color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
    .modal-img {
      width: 100%; height: 160px; object-fit: cover; border-radius: 8px;
      margin-bottom: 12px; background: var(--bg-color);
    }
    .modal-overlay {
      position: fixed; inset: 0; backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 50; padding: 20px; background: rgba(5,5,5,0.7);
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px; background: none; border: none;
      color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--text-primary); }
    .btn-primary {
      background: var(--accent-color); color: var(--text-primary); border: none;
      padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; margin: 4px;
    }
    .btn-secondary {
      background: transparent; color: var(--text-primary); border: 1px solid var(--border-color);
      padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; margin: 4px;
    }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 600px) {
      :root {
        --cell-size: 36px; /* Smaller cells */
        --grid-gap: 4px;   /* Tighter gap */
        --border-radius: 6px;
      }

      header {
        padding: 10px 12px;
      }

      h1 {
        font-size: 1.1rem; /* Smaller logo text */
      }

      .header-cell {
        font-size: 0.7rem; /* Smaller headers */
        letter-spacing: 0;
      }

      .cell {
        font-size: 0.7rem; /* Smaller cell text */
        padding: 2px;
      }

      #submit-btn {
        padding: 0 12px;
        font-size: 0.9rem;
      }

      .search-container {
        min-width: 0;
      }
    }
  </style>

  <script>
    // ==========================================
    // STARFIELD CONFIGURATION & INITIALIZATION
    // ==========================================
    const STARFIELD_CONFIG = {
      count: 2500,
      density: 1.7,
      twinkleSpeedRange: [0.2, 5], // Min & max speed per star
      rotationSpeed: 0.015,
      sizeBase: 0.07,
      sizeSpread: 0.015,          // Random size variation from base
      colorWarmth: 0.6,           // 0 = pure white, 1 = more yellow
      opacityRange: [0.65, 0.9],  // Base opacity range per star
      rotationRange: Math.PI * 2  // Full random rotation per star
    };

    function initStarfield() {
      const canvas = document.getElementById('starfield');
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 1;

      const count = STARFIELD_CONFIG.count;
      const positions = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const phases = new Float32Array(count);
      const speeds = new Float32Array(count);
      const colors = new Float32Array(count * 3);
      const baseOpacities = new Float32Array(count);
      const rotations = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        // Position
        positions[i * 3]     = (Math.random() - 0.5) * 10 * STARFIELD_CONFIG.density;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 10 * STARFIELD_CONFIG.density;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 10 * STARFIELD_CONFIG.density;

        // Size: base + random spread
        sizes[i] = STARFIELD_CONFIG.sizeBase + Math.random() * STARFIELD_CONFIG.sizeSpread;

        // Twinkle: random phase & speed per star
        phases[i] = Math.random() * Math.PI * 2;
        speeds[i] = STARFIELD_CONFIG.twinkleSpeedRange[0] + Math.random() * (STARFIELD_CONFIG.twinkleSpeedRange[1] - STARFIELD_CONFIG.twinkleSpeedRange[0]);

        // Color: White to light yellow
        const warmth = Math.random() * STARFIELD_CONFIG.colorWarmth;
        colors[i * 3]     = 1.0;
        colors[i * 3 + 1] = 1.0 - warmth * 0.2;
        colors[i * 3 + 2] = 1.0 - warmth * 0.5;

        // Opacity: random within range
        baseOpacities[i] = STARFIELD_CONFIG.opacityRange[0] + Math.random() * (STARFIELD_CONFIG.opacityRange[1] - STARFIELD_CONFIG.opacityRange[0]);

        // Rotation: random per star
        rotations[i] = Math.random() * STARFIELD_CONFIG.rotationRange;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
      geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aBaseOpacity', new THREE.BufferAttribute(baseOpacities, 1));
      geometry.setAttribute('aRotation', new THREE.BufferAttribute(rotations, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uPixelRatio: { value: renderer.getPixelRatio() }
        },
        vertexShader: `
          attribute float aSize;
          attribute float aPhase;
          attribute float aSpeed;
          attribute vec3 aColor;
          attribute float aBaseOpacity;
          attribute float aRotation;

          varying vec3 vColor;
          varying float vOpacity;
          varying float vRotation;
          varying float vTwinkle;

          uniform float uTime;
          uniform float uPixelRatio;

          void main() {
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;

            // Per-star twinkle factor (0 to 1)
            float twinkle = sin(uTime * aSpeed + aPhase) * 0.4 + 0.6;
            vTwinkle = twinkle;

            // Size with distance attenuation
            float dist = -mvPosition.z;
            gl_PointSize = aSize * uPixelRatio * (200.0 / dist);

            vColor = aColor;
            vOpacity = aBaseOpacity * (0.6 + twinkle * 0.4);
            vRotation = aRotation;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          varying float vOpacity;
          varying float vRotation;
          varying float vTwinkle;

          void main() {
            vec2 coord = gl_PointCoord - 0.5;

            // Rotate the point sprite
            float c = cos(vRotation);
            float s = sin(vRotation);
            coord = vec2(coord.x * c - coord.y * s, coord.x * s + coord.y * c);

            // Square shape with soft edges
            float dist = max(abs(coord.x), abs(coord.y));
            if (dist > 0.5) discard;

            float alpha = smoothstep(0.5, 0.35, dist);
            alpha *= vOpacity;

            // Brightness pulse with twinkle
            vec3 color = vColor * (0.85 + vTwinkle * 0.15);

            gl_FragColor = vec4(color, alpha);
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.NormalBlending
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);

      function animate(time) {
        requestAnimationFrame(animate);
        const t = time * 0.001;

        stars.rotation.y = t * STARFIELD_CONFIG.rotationSpeed;
        stars.rotation.x = t * STARFIELD_CONFIG.rotationSpeed * 0.5;

        // Pass time to shader for twinkle calculation
        material.uniforms.uTime.value = t;
        renderer.render(scene, camera);
      }
      animate(0);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      });
    }

    ];
    const CONFIG = {
      maxGuesses: 6,
      easyMode: false,
      theme: 'dark',
      columns: ['Project', 'Year', 'Dept', 'Done?', 'Env', 'Status']
    };

    let state = {
      target: null,
      guesses: [],
      currentInput: '',
      gameOver: false,
      acIndex: -1,
      acItems: []
    };

    function initGame() {
      // Ensure projects are sorted alphabetically initially
      if (PROJECTS.length > 0) {
        PROJECTS.sort((a, b) => a.shortName.localeCompare(b.shortName));
      }
      state.acItems = [...PROJECTS];
      state.target = PROJECTS[Math.floor(Math.random() * PROJECTS.length)];
      state.guesses = [];
      state.currentRow = 0;
      state.gameOver = false;
      
      const grid = document.getElementById('guess-grid');
      grid.innerHTML = '';
      for (let i = 0; i < CONFIG.maxGuesses; i++) {
        const row = document.createElement('div');
        row.className = 'guess-row';
        row.id = `row-${i}`;
        for (let j = 0; j < 6; j++) {
          const cell = document.createElement('div');
          cell.className = 'cell empty';
          cell.id = `r${i}-c${j}`;
          row.appendChild(cell);
        }
        grid.appendChild(row);
      }
      document.getElementById('project-input').value = '';
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').style.opacity = '1';
      console.log('Game Initialised. Target:', state.target.shortName);
    }

    function compareDesignEnvs(guessEnv, targetEnv) {
      const guessSet = new Set(guessEnv);
      const targetSet = new Set(targetEnv);
      if (guessSet.size === targetSet.size && [...guessSet].every(item => targetSet.has(item))) return 'CORRECT';
      if ([...guessSet].some(item => targetSet.has(item))) return 'PARTIAL';
      return 'WRONG';
    }

    function evaluateGuess(guess) {
      return {
        project: guess.shortName === state.target.shortName ? 'CORRECT' : 'WRONG',
        year: guess.startYear > state.target.startYear ? 'DOWN' : guess.startYear < state.target.startYear ? 'UP' : 'CORRECT',
        dept: guess.department === state.target.department ? 'CORRECT' : 'WRONG',
        done: guess.isCompleted === state.target.isCompleted ? 'CORRECT' : 'WRONG',
        lastActive: guess.lastActive > state.target.lastActive ? 'DOWN' : guess.lastActive < state.target.lastActive ? 'UP' : 'CORRECT',
        env: compareDesignEnvs(guess.designEnv, state.target.designEnv)
      };
    }

    function mapFeedback(val, fb, isShortName = false) {
      let cls = 'wrong';
      let display = val;
      if (isShortName) cls = 'neutral';
      else if (fb === 'CORRECT') cls = 'correct';
      else if (fb === 'UP') { cls = 'higher'; display = '⬆️ ' + val; }
      else if (fb === 'DOWN') { cls = 'lower'; display = '⬇️ ' + val; }
      else if (fb === 'PARTIAL') cls = 'partial';
      return `<div class="cell ${cls}">${display}</div>`;
    }

    function handleSubmission() {
      const input = document.getElementById('project-input').value.trim().toUpperCase();
      if (!input) return;
      const guess = PROJECTS.find(p => p.shortName.toUpperCase() === input);
      if (!guess) return;

      const feedback = evaluateGuess(guess);
      state.guesses.push({ project: guess, feedback });
      
      const rowId = `row-${state.currentRow}`;
      const rowEl = document.getElementById(rowId);
      rowEl.innerHTML = '';

      const cells = [
        { val: guess.shortName, fb: feedback.project, isName: true },
        { val: guess.department, fb: feedback.dept },
        { val: guess.startYear, fb: feedback.year },
        { val: guess.lastActive, fb: feedback.lastActive },
        { val: guess.isCompleted ? 'No' : 'Yes', fb: feedback.done },
        { val: guess.designEnv.join(', '), fb: feedback.env }
      ];

      cells.forEach((c, index) => {
        const cellDiv = document.createElement('div');
        cellDiv.innerHTML = mapFeedback(c.val, c.fb, c.isName);
        const cellElement = cellDiv.firstChild;
        
        // Add animation class and staggered delay
        cellElement.classList.add('animate');
        cellElement.style.animationDelay = `${index * 0.2}s`;
        
        rowEl.appendChild(cellElement);
      });

      document.getElementById('project-input').value = '';
      hideAutocomplete();
      state.currentRow++;

      if (feedback.project === 'CORRECT' || state.guesses.length >= CONFIG.maxGuesses) {
        endGame(feedback.project === 'CORRECT');
      }
    }

    function getEmoji(fb) {
      if (fb === 'CORRECT') return '🟩';
      if (fb === 'WRONG') return '🟥';
      if (fb === 'PARTIAL') return '🟨';
      if (fb === 'UP') return '🟦';
      if (fb === 'DOWN') return '🟪';
      return '⬜';
    }

    function endGame(won) {
      state.gameOver = true;
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').style.opacity = '0.5';

      // 1. Hide input, show result area
      document.getElementById('input-area').style.display = 'none';
      const resultArea = document.getElementById('result-area');
      resultArea.style.display = 'block';

      // 2. Populate content (using the new IDs)
      const title = won ? '🎉 You Got It!' : '📡 Mission Failed';
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-desc').textContent = "The answer was " + state.target.longName + " (" + state.target.shortName + ").\n" + (state.target.description || 'No description available.');
      
      const imgEl = document.getElementById('result-image');
      if (state.target.imageUrl) { imgEl.src = state.target.imageUrl; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }

      const status = won ? state.guesses.length : 'X';
      let shareText = `PASTDLE #${state.target.id} ${status}/${CONFIG.maxGuesses}\n\n`;
      state.guesses.forEach(g => {
        const row = [getEmoji(g.feedback.dept), getEmoji(g.feedback.year), getEmoji(g.feedback.lastActive), getEmoji(g.feedback.done), getEmoji(g.feedback.env)].join('');
        shareText += row + '\n';
      });
      document.getElementById('result-share').textContent = shareText.trimEnd('\n');
      if (won) {
        confetti({
          particleCount: 150,
          spread: 70,
          decay: 0.91,
          startVelocity: 40,
          ticks: 300,
          origin: { y: 0.65}
        });
      }
    }

    function resetGame() {
      // Show input area again, hide result area
      document.getElementById('input-area').style.display = 'flex';
      document.getElementById('result-area').style.display = 'none';
      initGame();
    }

    // AUTOCOMPLETE
    const acList = document.getElementById('autocomplete-list');
    const input = document.getElementById('project-input');
    input.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      // Filter and ALWAYS sort alphabetically
      state.acItems = PROJECTS.filter(p =>
        p.shortName.toLowerCase().includes(q) ||
        p.longName.toLowerCase().includes(q) ||
        p.tags.some(t => t.toLowerCase().includes(q))
      ).sort((a, b) => a.shortName.localeCompare(b.shortName));
      
      renderAutocomplete();
    });

    function renderAutocomplete() {
      acList.innerHTML = '';
      if (state.acItems.length === 0) { hideAutocomplete(); return; }
      state.acItems.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = `ac-item ${i === state.acIndex ? 'active' : ''}`;
        div.innerHTML = `<span class="ac-short">${p.shortName}</span><span class="ac-long">${p.longName}</span>`;
        div.onclick = () => { input.value = p.shortName; hideAutocomplete(); };
        acList.appendChild(div);
      });
      acList.style.display = 'block';
      state.acIndex = -1;
    }

    function hideAutocomplete() {
      acList.style.display = 'none';
      state.acItems = [...PROJECTS]; // Reset to full sorted list
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { state.acIndex = Math.min(state.acIndex + 1, state.acItems.length - 1); renderAutocomplete(); }
      if (e.key === 'ArrowUp')   { state.acIndex = Math.max(state.acIndex - 1, -1); renderAutocomplete(); }
      if (e.key === 'Enter') {
        if (state.acIndex >= 0) { input.value = state.acItems[state.acIndex].shortName; hideAutocomplete(); }
        handleSubmission();
      }
    });

    // EVENT LISTENERS
    document.getElementById('submit-btn').addEventListener('click', handleSubmission);
    document.getElementById('help-btn').addEventListener('click', () => toggleModal('help-modal'));
    input.addEventListener('focus', () => { if (state.acItems.length > 0) renderAutocomplete(); });
    document.getElementById('reset-btn').addEventListener('click', resetGame);
    document.getElementById('modal-close-btn').addEventListener('click', () => toggleModal('end-modal'));
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) hideAutocomplete(); });

    function toggleModal(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
    }

    function copyShare() {
      const text = document.getElementById('share-box').textContent;
      navigator.clipboard.writeText(text);
    }

    // Initialize everything
    initStarfield();
    initGame();
  </script>
